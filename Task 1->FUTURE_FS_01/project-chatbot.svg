<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0f0a1e"/>
  <pattern id="cgrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1030" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#cgrid)"/>

  <!-- Chat window frame -->
  <rect x="60" y="30" width="680" height="440" rx="16" fill="#13111e" stroke="#2d2460" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="30" width="680" height="58" rx="16" fill="#1e1a30"/>
  <rect x="60" y="72" width="680" height="16" fill="#1e1a30"/>

  <!-- Bot avatar -->
  <circle cx="100" cy="59" r="18" fill="#7c3aed"/>
  <rect x="91" y="51" width="18" height="14" rx="3" fill="#0f0a1e"/>
  <circle cx="96" cy="57" r="2.5" fill="#a78bfa"/>
  <circle cx="104" cy="57" r="2.5" fill="#a78bfa"/>
  <rect x="94" y="62" width="10" height="2" rx="1" fill="#a78bfa"/>
  <line x1="100" y1="41" x2="100" y2="34" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="100" cy="33" r="3" fill="#a78bfa"/>

  <text x="128" y="55" font-family="sans-serif" font-size="15" font-weight="600" fill="#e2e8f0">Friendly Chatbot</text>
  <circle cx="130" cy="68" r="4" fill="#22c55e"/>
  <text x="138" y="72" font-family="sans-serif" font-size="11" fill="#22c55e">Online</text>

  <!-- Window controls -->
  <circle cx="706" cy="52" r="7" fill="#ef4444" opacity="0.7"/>
  <circle cx="724" cy="52" r="7" fill="#f59e0b" opacity="0.7"/>

  <!-- Bot message 1 -->
  <rect x="80" y="108" width="290" height="44" rx="12" fill="#1e1a30" stroke="#2d2460" stroke-width="1"/>
  <text x="98" y="126" font-family="sans-serif" font-size="12" fill="#e2e8f0">Hi! I am your friendly assistant.</text>
  <text x="98" y="144" font-family="sans-serif" font-size="12" fill="#e2e8f0">How can I help you today?</text>
  <text x="364" y="150" font-family="sans-serif" font-size="9" fill="#4b5563">10:22 AM</text>

  <!-- User message 1 -->
  <rect x="430" y="170" width="290" height="28" rx="12" fill="#7c3aed"/>
  <text x="448" y="189" font-family="sans-serif" font-size="12" fill="white">Tell me something interesting!</text>
  <text x="404" y="197" font-family="sans-serif" font-size="9" fill="#4b5563">10:22 AM</text>

  <!-- Bot message 2 -->
  <rect x="80" y="216" width="370" height="60" rx="12" fill="#1e1a30" stroke="#2d2460" stroke-width="1"/>
  <text x="98" y="234" font-family="sans-serif" font-size="12" fill="#e2e8f0">Did you know? The first chatbot,</text>
  <text x="98" y="252" font-family="sans-serif" font-size="12" fill="#e2e8f0">ELIZA, was made in 1966 at MIT.</text>
  <text x="98" y="270" font-family="sans-serif" font-size="12" fill="#a78bfa">It could simulate conversation!</text>
  <text x="444" y="276" font-family="sans-serif" font-size="9" fill="#4b5563">10:23 AM</text>

  <!-- User message 2 -->
  <rect x="500" y="295" width="220" height="28" rx="12" fill="#7c3aed"/>
  <text x="518" y="314" font-family="sans-serif" font-size="12" fill="white">What is 15 x 48?</text>
  <text x="476" y="322" font-family="sans-serif" font-size="9" fill="#4b5563">10:23 AM</text>

  <!-- Bot message 3 -->
  <rect x="80" y="342" width="220" height="44" rx="12" fill="#1e1a30" stroke="#2d2460" stroke-width="1"/>
  <text x="98" y="360" font-family="sans-serif" font-size="12" fill="#e2e8f0">Easy one! Let me calculate...</text>
  <text x="98" y="378" font-family="sans-serif" font-size="12" fill="#e2e8f0">15 x 48 = <tspan fill="#22c55e" font-weight="bold">720</tspan></text>
  <text x="294" y="385" font-family="sans-serif" font-size="9" fill="#4b5563">10:23 AM</text>

  <!-- Typing dots -->
  <rect x="80" y="402" width="72" height="30" rx="15" fill="#1e1a30" stroke="#2d2460" stroke-width="1"/>
  <circle cx="101" cy="417" r="4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="116" cy="417" r="4" fill="#a78bfa" opacity="0.7"/>
  <circle cx="131" cy="417" r="4" fill="#a78bfa"/>

  <!-- Input bar -->
  <rect x="60" y="444" width="680" height="26" rx="13" fill="#1a1630" stroke="#2d2460" stroke-width="1"/>
  <text x="86" y="462" font-family="sans-serif" font-size="11" fill="#374151">Type a message...</text>

  <!-- Send button -->
  <circle cx="722" cy="457" r="14" fill="#7c3aed"/>
  <polygon points="715,452 715,462 727,457" fill="white"/>

  <!-- Label -->
  <text x="560" y="462" font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.5">FRIENDLY CHATBOT</text>
</svg>
