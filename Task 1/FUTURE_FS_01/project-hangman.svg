<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0f0f0f"/>
  <!-- Background grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Gallows structure -->
  <!-- Base -->
  <line x1="120" y1="420" x2="320" y2="420" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <!-- Vertical pole -->
  <line x1="200" y1="420" x2="200" y2="80" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <!-- Horizontal beam -->
  <line x1="200" y1="80" x2="360" y2="80" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  <!-- Rope -->
  <line x1="360" y1="80" x2="360" y2="140" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal support -->
  <line x1="200" y1="130" x2="280" y2="80" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>

  <!-- Stick figure -->
  <!-- Head -->
  <circle cx="360" cy="170" r="28" stroke="#e2e8f0" stroke-width="4" fill="none"/>
  <!-- Eyes -->
  <line x1="350" y1="162" x2="354" y2="166" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="354" y1="162" x2="350" y2="166" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="366" y1="162" x2="370" y2="166" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="370" y1="162" x2="366" y2="166" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mouth (sad) -->
  <path d="M 350 178 Q 360 172 370 178" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <line x1="360" y1="198" x2="360" y2="290" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="360" y1="220" x2="320" y2="255" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="220" x2="400" y2="255" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="360" y1="290" x2="325" y2="340" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="290" x2="395" y2="340" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>

  <!-- Word blanks on the right side -->
  <!-- Label -->
  <text x="480" y="170" font-family="monospace" font-size="13" fill="#3b82f6" letter-spacing="2">GUESS THE WORD</text>

  <!-- Letter blanks - 7 letters -->
  <line x1="470" y1="230" x2="510" y2="230" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="520" y1="230" x2="560" y2="230" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="570" y1="230" x2="610" y2="230" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="230" x2="660" y2="230" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
  <line x1="670" y1="230" x2="710" y2="230" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

  <!-- Revealed letters -->
  <text x="484" y="220" font-family="monospace" font-size="26" fill="#e2e8f0" font-weight="bold">H</text>
  <text x="534" y="220" font-family="monospace" font-size="26" fill="#e2e8f0" font-weight="bold">A</text>
  <text x="584" y="220" font-family="monospace" font-size="26" fill="#e2e8f0" font-weight="bold">N</text>
  <text x="634" y="220" font-family="monospace" font-size="26" fill="#e2e8f0" font-weight="bold">G</text>

  <!-- Wrong letters -->
  <text x="470" y="290" font-family="monospace" font-size="13" fill="#94a3b8">WRONG:</text>
  <text x="545" y="290" font-family="monospace" font-size="13" fill="#ef4444">B  C  D  F  I</text>

  <!-- Lives remaining -->
  <text x="470" y="330" font-family="monospace" font-size="13" fill="#94a3b8">LIVES:</text>
  <circle cx="548" cy="325" r="6" fill="#ef4444"/>
  <circle cx="568" cy="325" r="6" fill="#64748b"/>
  <circle cx="588" cy="325" r="6" fill="#64748b"/>
  <circle cx="608" cy="325" r="6" fill="#64748b"/>
  <circle cx="628" cy="325" r="6" fill="#64748b"/>

  <!-- Score -->
  <text x="470" y="380" font-family="monospace" font-size="13" fill="#94a3b8">SCORE: <tspan fill="#3b82f6">240</tspan></text>

  <!-- Title bottom right -->
  <text x="570" y="450" font-family="monospace" font-size="11" fill="#3b82f6" opacity="0.6">HANGMAN GAME</text>
</svg>
